<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lincoln High School Speech and Debate Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Gowun Batang', 'Georgia', 'serif'],
                        sans: ['Gowun Batang', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        cream: '#fdfcf8',
                        beige: '#f5f1e8',
                        charcoal: '#4a4a4a',
                        'dark-text': '#1a1a1a',
                    }
                }
            }
        }
    </script>
<style>
  /* custom styles for precise styling */
  body {
    background-color: #fdfcf8;
  }

  .nav-link {
    position: relative;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background-color: #1a1a1a;
    transition: width 0.3s;
 }

 .nav-link:hover::after {
  width: 100%;
 }
</style>
</head>
<body>
  <body class="font-sans text-dark-text antialiased">
    
    <!-- Navigaion -->
     <nav class="w-full px-8 py-6 flex items-center justify-between max-w-7xl mx-auto">
      <div class="flex items-center gap-12 ">
        <a href="#" class="nav-link text-sm font-medium tracking-wide font-semibold">Home</a>
        <a href="#details" class="nav-link text-sm font-medium tracking-wide font-semibold">Details</a>
        <a href="#news" class="nav-link text-sm font-medium tracking-wide font-semibold">News</a>
        <a href="#Contact" class="nav-link text-sm font-medium tracking-wide font-semibold">Contact</a>
      </div>
     </nav>

     <!-- ANnouncement Banner -->
      <div class="mx-8 mb-8">
        <div class="bg-beige rounded-lg px-6 py-4 flex items-center justify-between max-w-7xl mx-auto">
          <p class="text-sm font-medium text-dark-text font-semibold">Annoucement: Spring ASB Election is now live for voting!</p>
          <a href="#" class="text-sm font-semibold underline hover:no-underline">Survey here</a>
        </div>
      </div>

      <!-- Hero section -->
       <section class="px-8 pb-16
       text-center max-w-4xl mx-auto">
        <p class="text-sm font-sm font-medium mb-6 tracking-wide text-gray-600">Committed to all students in need</p>
        <h1 class="font-serif text-5xl md:text-6xl lg:text-7xl leading-tight mb-8 text-dark-text">Lincoln High School Speech and Debate Club</h1>
        <a href="#join" class="inline-block text-sm font-semibold underline underline-offset-4 hover:no-underline mb-12">Join us</a>
       </section>

       <!-- Hero Image -->
        <div class="w-full h-[60vh] md:h-[70vh] overflow-hidden">
          <img src="./images/books.jpg" alt="library bookshelves" class="w-full h-full object-cover">
        </div>
        
  </body>
</body>
</html>
