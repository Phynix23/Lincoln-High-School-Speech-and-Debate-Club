<head>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {

                        sans: ['Gowun Batang', 'system-ui', 'sans-serif'],

<style>
  /* custom styles for precise styling */
  body {
    background-color: #fdfcf8;
  }

  .nav-link {
    position: relative;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background-color: #1a1a1a;
    transition: width 0.3s;
 }

 .nav-link:hover::after {
  width: 100%;
 }
</style>
</head>
